<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retro Typing</title>
  <script>
    // Show JS errors on screen for debugging
    window.onerror = function(msg, url, line) {
      var d = document.createElement('div');
      d.style.cssText = 'position:fixed;top:0;left:0;right:0;padding:12px;background:red;color:white;font:14px monospace;z-index:99999;word-break:break-all';
      d.textContent = msg + ' (' + url + ':' + line + ')';
      document.body.appendChild(d);
    };
    // Set base href so relative paths work when served under a subpath (e.g. /typing)
    (function() {
      var path = window.location.pathname;
      if (path.charAt(path.length - 1) !== '/') path += '/';
      var base = document.createElement('base');
      base.href = path;
      document.head.appendChild(base);
    })();
  </script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="game-container"></div>

  <!-- Phaser 3 -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

  <!-- Word bank -->
  <script src="words/wordlist.js"></script>

  <!-- Core systems -->
  <script src="src/core/LevelSystem.js"></script>
  <script src="src/core/WordEngine.js"></script>
  <script src="src/core/InputHandler.js"></script>
  <script src="src/core/ScoreManager.js"></script>

  <!-- Scenes -->
  <script src="src/scenes/BootScene.js"></script>
  <script src="src/scenes/MenuScene.js"></script>
  <script src="src/scenes/LevelSelectScene.js"></script>
  <script src="src/scenes/HUDScene.js"></script>
  <script src="src/scenes/GameOverScene.js"></script>
  <script src="src/scenes/WhackAMoleScene.js"></script>
  <script src="src/scenes/SpaceInvadersScene.js"></script>
  <script src="src/scenes/AsteroidsScene.js"></script>
  <script src="src/scenes/MissileCommandScene.js"></script>
  <script src="src/scenes/TapperScene.js"></script>
  <script src="src/scenes/RampageScene.js"></script>

  <!-- Config and bootstrap (must be last) -->
  <script src="src/config.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
